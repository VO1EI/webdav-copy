# Reject TLS handshakes silently on the plain-HTTP port.
# The map below detects TLS ClientHello (first byte 0x16) and returns 444.
map $ssl_preread_protocol $is_tls {
    default   0;
    "TLSv1"   1;
    "TLSv1.1" 1;
    "TLSv1.2" 1;
    "TLSv1.3" 1;
}

server {
    listen 80;
    server_name _;

    root  /usr/share/nginx/html;
    index index.html;

    # Only log actual errors, not TLS probe noise
    error_log  /var/log/nginx/error.log crit;
    access_log /var/log/nginx/access.log;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"                   always;
    add_header X-Content-Type-Options "nosniff"                      always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;

    # Proxy API + SSE to backend
    location /api/ {
        proxy_pass         http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection '';
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_cache_bypass $http_upgrade;
        # SSE: disable all buffering
        proxy_buffering           off;
        proxy_read_timeout        86400s;
        proxy_send_timeout        86400s;
        chunked_transfer_encoding on;
        add_header X-Accel-Buffering no;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
