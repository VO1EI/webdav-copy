version: '3.8'

services:
  backend:
    build:
      context: ./backend
    container_name: webdav-smb-backend
    restart: unless-stopped
    volumes:
      - app-data:/data
    environment:
      - NODE_ENV=production
      - PORT=3001
    networks:
      - app-net

  frontend:
    build:
      context: ./frontend
    container_name: webdav-smb-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend
    networks:
      - app-net

volumes:
  app-data:

networks:
  app-net:
    driver: bridge
