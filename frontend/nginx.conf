# Drop TLS probes silently (browsers hitting https:// on a plain-HTTP port)
server {
    listen 80 default_server;
    server_name _;

    # Detect TLS ClientHello (first byte 0x16) and close without logging
    if ($request_method = "") {
        return 444;
    }

    root /usr/share/nginx/html;
    index index.html;

    access_log /var/log/nginx/access.log;
    error_log  /var/log/nginx/error.log crit;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Proxy API to backend container — SSE-friendly
    location /api/ {
        proxy_pass         http://backend:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection '';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_cache_bypass $http_upgrade;

        # Critical for SSE: disable all buffering
        proxy_buffering    off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        chunked_transfer_encoding on;
        add_header X-Accel-Buffering no;
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
